name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Linux x64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -o go_testapi_linux_amd64 .

      - name: Build Windows x64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -o go_testapi_windows_amd64.exe .

      - name: Package Linux
        run: |
          mkdir -p dist/linux
          cp go_testapi_linux_amd64 dist/linux/go_testapi
          cp config.template.json docs.html examples.ps1 dist/linux/
          cd dist && zip -r go_testapi_linux_amd64.zip linux/

      - name: Package Windows
        run: |
          mkdir -p dist/windows
          cp go_testapi_windows_amd64.exe dist/windows/go_testapi.exe
          cp config.template.json docs.html examples.ps1 dist/windows/
          cd dist && zip -r go_testapi_windows_amd64.zip windows/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/go_testapi_linux_amd64.zip
            dist/go_testapi_windows_amd64.zip
          generate_release_notes: true
